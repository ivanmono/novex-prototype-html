<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=480, initial-scale=1">
  <title>Novexx — Menu</title>
  <link rel="stylesheet" href="../styles/main.css">
<link href="css/styles.css" rel="stylesheet"></head>
<body>
<div class="device">
  <div class="page">

    <!-- Status Bar — RUNNING / READY state -->
<header class="status-bar" role="banner">

    <i class="icon icon--top-one icon--sm" aria-hidden="true"></i>
    <i class="icon icon--top-two icon--sm" aria-hidden="true"></i>
    <i class="icon icon--wifi icon--sm" aria-hidden="true"></i>

  <div class="status-bar__chip" role="status" aria-label="Machine status: Ready">
    <span class="status-bar__dot status-bar__dot--running" aria-hidden="true"></span>
    <span class="status-bar__label">Ready</span>
  </div>
</header>


    <!-- Page header -->
    <div class="page-header">
      <div class="page-header__left">
        <a href="index.html" class="page-header__back" aria-label="Go back to home">
          <i class="icon icon--arrow-left icon--md icon--white" aria-hidden="true"></i>
        </a>
        <h1 class="page-header__title">Menu</h1>
      </div>
    </div>

    <!-- Menu tile grid -->
    <main class="page__content page__content--menu" role="main">
      <nav aria-label="Application menu">
        <div class="menu-tile__grid">

          <a href="manage-users.html" class="menu-tile" aria-label="Manage Users — User management">
            <div class="menu-tile__inner">
              <div class="menu-tile__icon">
                <i class="icon icon--users icon--lg icon--navy" aria-hidden="true"></i>
              </div>
              <div class="menu-tile__text">
                <span class="menu-tile__label">Manage Users</span>
                <span class="menu-tile__sub">User management</span>
              </div>
            </div>
          </a>

          <div class="menu-tile menu-tile--disabled" aria-label="Settings — unavailable" aria-disabled="true">
            <div class="menu-tile__inner">
              <div class="menu-tile__icon">
                <i class="icon icon--cog icon--lg icon--orange" aria-hidden="true"></i>
              </div>
              <div class="menu-tile__text">
                <span class="menu-tile__label">Settings</span>
                <span class="menu-tile__sub">Device configuration</span>
              </div>
            </div>
          </div>

          <div class="menu-tile menu-tile--disabled" aria-label="Reports — unavailable" aria-disabled="true">
            <div class="menu-tile__inner">
              <div class="menu-tile__icon">
                <i class="icon icon--folders icon--lg icon--success" aria-hidden="true"></i>
              </div>
              <div class="menu-tile__text">
                <span class="menu-tile__label">Reports</span>
                <span class="menu-tile__sub">View reports</span>
              </div>
            </div>
          </div>

          <div class="menu-tile menu-tile--disabled" aria-label="Statistics — unavailable" aria-disabled="true">
            <div class="menu-tile__inner">
              <div class="menu-tile__icon">
                <i class="icon icon--speed icon--lg icon--yellow" aria-hidden="true"></i>
              </div>
              <div class="menu-tile__text">
                <span class="menu-tile__label">Statistics</span>
                <span class="menu-tile__sub">View statistics</span>
              </div>
            </div>
          </div>

          <div class="menu-tile menu-tile--disabled" aria-label="Jobs — unavailable" aria-disabled="true">
            <div class="menu-tile__inner">
              <div class="menu-tile__icon">
                <i class="icon icon--machine icon--lg icon--brand" aria-hidden="true"></i>
              </div>
              <div class="menu-tile__text">
                <span class="menu-tile__label">Jobs</span>
                <span class="menu-tile__sub">Job management</span>
              </div>
            </div>
          </div>

          <div class="menu-tile menu-tile--disabled" aria-label="Print Queue — unavailable" aria-disabled="true">
            <div class="menu-tile__inner">
              <div class="menu-tile__icon">
                <i class="icon icon--printer icon--lg icon--purple" aria-hidden="true"></i>
              </div>
              <div class="menu-tile__text">
                <span class="menu-tile__label">Print Queue</span>
                <span class="menu-tile__sub">Manage print queue</span>
              </div>
            </div>
          </div>

        </div>
      </nav>
    </main>

    <!-- Bottom Nav — Inner pages (logged in, L2 Super Admin) -->
<nav class="bottom-nav--inner" aria-label="Page navigation">
  <!-- Floating level avatar — 21px above bar -->
  <div class="bottom-nav__avatar-wrap">
    <a href="login.html" class="bottom-nav__avatar bottom-nav__avatar--l2" aria-label="Logged in as Super Admin, Level 2">
      <span aria-hidden="true">L2</span>
    </a>
    <span class="bottom-nav__label">Super Admin</span>
  </div>

  <div class="bottom-nav__gradient-line" aria-hidden="true"></div>

  <div class="bottom-nav__inner-bar">
    <!-- Back -->
    <a href="javascript:history.back()" class="bottom-nav__item" aria-label="Go back">
      <i class="icon icon--back-circle icon--md icon--white" aria-hidden="true"></i>
      <span class="bottom-nav__label">Back</span>
    </a>

    <!-- Spacer (avatar placeholder) -->
    <div class="bottom-nav__spacer" aria-hidden="true"></div>

    <!-- Menu -->
    <a href="menu.html" class="bottom-nav__item" aria-label="Open menu">
      <i class="icon icon--fill-more icon--sm icon--white" aria-hidden="true"></i>
      <span class="bottom-nav__label">Menu</span>
    </a>
  </div>
</nav>


  </div>
</div>
<script src="../js/main.js"></script>
<script defer src="js/bundle.js"></script></body>
</html>
