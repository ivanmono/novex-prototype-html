<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=480, initial-scale=1">
  <title>Novexx — Playground (Input Fields)</title>
  <link rel="stylesheet" href="../styles/main.css">
<link href="css/styles.css" rel="stylesheet"></head>
<body>
<div class="device">
  <div class="page">

    <!-- Status Bar — RUNNING / READY state -->
<header class="status-bar" role="banner">

    <i class="icon icon--top-one icon--sm" aria-hidden="true"></i>
    <i class="icon icon--top-two icon--sm" aria-hidden="true"></i>
    <i class="icon icon--wifi icon--sm" aria-hidden="true"></i>

  <div class="status-bar__chip" role="status" aria-label="Machine status: Ready">
    <span class="status-bar__dot status-bar__dot--running" aria-hidden="true"></span>
    <span class="status-bar__label">Ready</span>
  </div>
</header>


    <div class="page-header">
      <div class="page-header__left">
        <a href="index.html" class="page-header__back" aria-label="Go back">
          <i class="icon icon--arrow-left icon--md icon--white" aria-hidden="true"></i>
        </a>
        <h1 class="page-header__title">Playground 3</h1>
      </div>
    </div>

    <main class="page__content page__content--inner" role="main">

      <!-- Standalone numeric input with unit -->
      <div class="input-field">
        <label class="input-field__label" for="pf-speed">Print speed</label>
        <div class="input-field__border">
          <div class="input-field__row">
            <input class="input-field__control input-field__control--number" id="pf-speed" type="number" value="1.2356" aria-label="Print speed value">
            <span class="input-field__unit">pcs/h</span>
          </div>
        </div>
      </div>

      <!-- Row group — two inputs side by side -->
      <div class="input-group input-group--row">
        <div class="input-field">
          <label class="input-field__label" for="pf-start-c">Start</label>
          <div class="input-field__border">
            <div class="input-field__row">
              <input class="input-field__control input-field__control--number" id="pf-start-c" type="number" placeholder="Value">
              <span class="input-field__unit">°C</span>
            </div>
          </div>
        </div>
        <div class="input-field">
          <label class="input-field__label" for="pf-end-c">End</label>
          <div class="input-field__border">
            <div class="input-field__row">
              <input class="input-field__control input-field__control--number" id="pf-end-c" type="number" placeholder="Value">
              <span class="input-field__unit">°C</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Column group — two inputs stacked -->
      <div class="input-group input-group--column">
        <div class="input-field">
          <label class="input-field__label" for="pf-start-m">Start</label>
          <div class="input-field__border">
            <div class="input-field__row">
              <input class="input-field__control input-field__control--number" id="pf-start-m" type="number" value="12">
              <span class="input-field__unit">m</span>
            </div>
          </div>
        </div>
        <div class="input-field">
          <label class="input-field__label" for="pf-end-m">End</label>
          <div class="input-field__border">
            <div class="input-field__row">
              <input class="input-field__control input-field__control--number" id="pf-end-m" type="number" value="50">
              <span class="input-field__unit">m</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Text input (no unit) -->
      <div class="input-field">
        <label class="input-field__label" for="pf-name">Product name</label>
        <div class="input-field__border">
          <div class="input-field__row">
            <input class="input-field__control input-field__control--text" id="pf-name" type="text" placeholder="Enter product name">
          </div>
        </div>
      </div>

      <button class="btn btn--primary m--top--bs" type="button">Save</button>

    </main>

    <!-- Bottom Nav — Inner pages (logged in, L2 Super Admin) -->
<nav class="bottom-nav--inner" aria-label="Page navigation">
  <!-- Floating level avatar — 21px above bar -->
  <div class="bottom-nav__avatar-wrap">
    <a href="login.html" class="bottom-nav__avatar bottom-nav__avatar--l2" aria-label="Logged in as Super Admin, Level 2">
      <span aria-hidden="true">L2</span>
    </a>
    <span class="bottom-nav__label">Super Admin</span>
  </div>

  <div class="bottom-nav__gradient-line" aria-hidden="true"></div>

  <div class="bottom-nav__inner-bar">
    <!-- Back -->
    <a href="javascript:history.back()" class="bottom-nav__item" aria-label="Go back">
      <i class="icon icon--back-circle icon--md icon--white" aria-hidden="true"></i>
      <span class="bottom-nav__label">Back</span>
    </a>

    <!-- Spacer (avatar placeholder) -->
    <div class="bottom-nav__spacer" aria-hidden="true"></div>

    <!-- Menu -->
    <a href="menu.html" class="bottom-nav__item" aria-label="Open menu">
      <i class="icon icon--fill-more icon--sm icon--white" aria-hidden="true"></i>
      <span class="bottom-nav__label">Menu</span>
    </a>
  </div>
</nav>


  </div>
</div>
<script src="../js/main.js"></script>
<script defer src="js/bundle.js"></script></body>
</html>
