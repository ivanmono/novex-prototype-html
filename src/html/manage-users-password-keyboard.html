<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=480, initial-scale=1">
  <title>Novexx — Change Password (Keyboard)</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<div class="device">
  <div class="page">

    <include src="partials/status-bar.html"></include>

    <div class="page-header">
      <div class="page-header__left">
        <a href="manage-users-edit.html" class="page-header__back" aria-label="Back">
          <i class="icon icon--arrow-left icon--md icon--white" aria-hidden="true"></i>
        </a>
        <h1 class="page-header__title">Edit Password</h1>
      </div>
    </div>

    <main class="page__content page__content--keyboard" role="main">
      <div class="input-field">
        <label class="input-field__label" for="kb-current">Current Password</label>
        <input class="input" id="kb-current" type="password" value="••••••••">
      </div>
      <div class="input-field">
        <label class="input-field__label" for="kb-new">New Password</label>
        <input class="input" id="kb-new" type="text" placeholder="abc…" aria-label="New password being typed">
      </div>
    </main>

    <!-- Alphabetic keyboard overlay -->
    <div class="keyboard" role="application" aria-label="Keyboard">
      <div class="keyboard__row">
        <button class="keyboard__key">q</button>
        <button class="keyboard__key">w</button>
        <button class="keyboard__key">e</button>
        <button class="keyboard__key">r</button>
        <button class="keyboard__key">t</button>
        <button class="keyboard__key">y</button>
        <button class="keyboard__key">u</button>
        <button class="keyboard__key">i</button>
        <button class="keyboard__key">o</button>
        <button class="keyboard__key">p</button>
      </div>
      <div class="keyboard__row">
        <button class="keyboard__key">a</button>
        <button class="keyboard__key">s</button>
        <button class="keyboard__key">d</button>
        <button class="keyboard__key">f</button>
        <button class="keyboard__key">g</button>
        <button class="keyboard__key">h</button>
        <button class="keyboard__key">j</button>
        <button class="keyboard__key">k</button>
        <button class="keyboard__key">l</button>
      </div>
      <div class="keyboard__row">
        <button class="keyboard__key keyboard__key--action keyboard__key--wide">⇧</button>
        <button class="keyboard__key">z</button>
        <button class="keyboard__key">x</button>
        <button class="keyboard__key">c</button>
        <button class="keyboard__key">v</button>
        <button class="keyboard__key">b</button>
        <button class="keyboard__key">n</button>
        <button class="keyboard__key">m</button>
        <button class="keyboard__key keyboard__key--action keyboard__key--wide" aria-label="Delete">⌫</button>
      </div>
      <div class="keyboard__row">
        <button class="keyboard__key keyboard__key--action keyboard__key--wide">123</button>
        <button class="keyboard__key keyboard__key--widest" aria-label="Space">space</button>
        <a href="manage-users-edit.html" class="keyboard__key keyboard__key--action keyboard__key--wide" aria-label="Return / Done">↵</a>
      </div>
    </div>

    <include src="partials/bottom-nav-inner.html"></include>

  </div>
</div>
<script src="../js/main.js"></script>
</body>
</html>
