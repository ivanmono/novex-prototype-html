<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=480, initial-scale=1">
  <title>Novexx — Change Password</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<div class="device">
  <div class="page">

    <include src="partials/status-bar.html"></include>

    <div class="page-header">
      <div class="page-header__left">
        <a href="manage-users-edit.html" class="page-header__back" aria-label="Back to edit user">
          <i class="icon icon--arrow-left icon--md icon--white" aria-hidden="true"></i>
        </a>
        <h1 class="page-header__title">Edit Password</h1>
      </div>
    </div>

    <main class="page__content page__content--inner" role="main">
      <form action="manage-users-edit.html" method="get" novalidate class="form-stack">

        <div class="input-field">
          <label class="input-field__label" for="current-password">Current Password</label>
          <input
            class="input"
            id="current-password"
            type="password"
            value="••••••••"
            aria-required="true"
          >
        </div>

        <div class="input-field">
          <label class="input-field__label" for="new-password">New Password</label>
          <input
            class="input"
            id="new-password"
            type="password"
            placeholder="Enter new password"
            aria-required="true"
          >
        </div>

        <div class="input-field">
          <label class="input-field__label" for="confirm-password">Confirm Password</label>
          <input
            class="input"
            id="confirm-password"
            type="password"
            placeholder="Confirm new password"
            aria-required="true"
          >
        </div>

        <button type="submit" class="btn btn--primary m--top--bs">Save</button>
      </form>
    </main>

    <include src="partials/bottom-nav-inner.html"></include>

  </div>
</div>
<script src="../js/main.js"></script>
</body>
</html>
