<!-- Status Bar — STAND BY state -->
<header class="status-bar" role="banner">

    <i class="icon icon--top-one icon--sm" aria-hidden="true"></i>
    <i class="icon icon--top-two icon--sm" aria-hidden="true"></i>
    <i class="icon icon--wifi icon--sm" aria-hidden="true"></i>

  <div class="status-bar__chip" role="status" aria-label="Machine status: Stand By">
    <span class="status-bar__dot status-bar__dot--standby" aria-hidden="true"></span>
    <span class="status-bar__label">Stand By</span>
  </div>
</header>
