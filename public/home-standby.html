<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=480, initial-scale=1">
  <title>Novexx — Home (Stand By)</title>
  <link rel="stylesheet" href="../styles/main.css">
<link href="css/styles.css" rel="stylesheet"></head>
<body>
<div class="device">
  <div class="page">

    <!-- Status Bar — STAND BY state -->
<header class="status-bar" role="banner">

    <i class="icon icon--top-one icon--sm" aria-hidden="true"></i>
    <i class="icon icon--top-two icon--sm" aria-hidden="true"></i>
    <i class="icon icon--wifi icon--sm" aria-hidden="true"></i>

  <div class="status-bar__chip" role="status" aria-label="Machine status: Stand By">
    <span class="status-bar__dot status-bar__dot--standby" aria-hidden="true"></span>
    <span class="status-bar__label">Stand By</span>
  </div>
</header>


    <main class="page__content page__content--home">
      <div class="page__glow" aria-hidden="true"></div>

      <img src="../assets/images/logo.svg" alt="Novexx Solutions" class="home__logo">

      <!-- Play button — active in standby -->
      <button class="play-btn" aria-label="Machine on stand by — click to start">
        <div class="play-btn__ring">
          <div class="play-btn__inner">
            <i class="icon icon--play-big icon--xl icon--white" aria-hidden="true"></i>
          </div>
        </div>
      </button>

      <!-- Machine name + status pill -->
      <div class="home__machine-info">
        <span class="t-hero">Line Name 5468</span>
        <span class="status-pill status-pill--standby" role="status">STAND BY</span>
      </div>

      <!-- Quick link tiles — dimmed in standby -->
      <div class="quick-links" role="navigation" aria-label="Quick links">
        <div class="quick-link quick-link--disabled">
          <div class="quick-link__inner">
            <div class="quick-link__text">
              <span class="quick-link__category">Playground</span>
              <span class="quick-link__name">Sliders</span>
            </div>
            <i class="icon icon--arrow-right-alt icon--sm icon--muted" aria-hidden="true"></i>
          </div>
        </div>

        <div class="quick-link quick-link--disabled">
          <div class="quick-link__inner">
            <div class="quick-link__text">
              <span class="quick-link__category">Playground</span>
              <span class="quick-link__name">Select Drawer</span>
            </div>
            <i class="icon icon--arrow-right-alt icon--sm icon--muted" aria-hidden="true"></i>
          </div>
        </div>

        <div class="quick-link quick-link--disabled">
          <div class="quick-link__inner">
            <div class="quick-link__text">
              <span class="quick-link__category">Playground</span>
              <span class="quick-link__name">Input Fields</span>
            </div>
            <i class="icon icon--arrow-right-alt icon--sm icon--muted" aria-hidden="true"></i>
          </div>
        </div>

        <div class="quick-link quick-link--disabled">
          <div class="quick-link__inner">
            <div class="quick-link__text">
              <span class="quick-link__category">Production</span>
              <span class="quick-link__name">Formats/Recipes</span>
            </div>
            <i class="icon icon--arrow-right-alt icon--sm icon--muted" aria-hidden="true"></i>
          </div>
        </div>
      </div>
    </main>

    <!-- Bottom Nav — Home Stand By: Trigger / Login / Menu -->
<nav class="bottom-nav--home" aria-label="Main navigation">
  <div class="bottom-nav__separator bottom-nav__separator--standby" aria-hidden="true"></div>
  <div class="bottom-nav__bar">
    <button class="bottom-nav__item bottom-nav__item--disabled" disabled="" aria-label="Trigger (unavailable)">
      <i class="icon icon--play icon--sm icon--muted" aria-hidden="true"></i>
      <span class="bottom-nav__label">Trigger</span>
    </button>

    <a href="login.html" class="bottom-nav__item" aria-label="Login">
      <i class="icon icon--fill-user icon--sm" aria-hidden="true"></i>
      <span class="bottom-nav__label bottom-nav__label--accent">Login</span>
    </a>

    <a href="menu.html" class="bottom-nav__item" aria-label="Open menu">
      <i class="icon icon--fill-more icon--sm" aria-hidden="true"></i>
      <span class="bottom-nav__label">Menu</span>
    </a>
  </div>
</nav>


  </div>
</div>
<script src="../js/main.js"></script>
<script defer src="js/bundle.js"></script></body>
</html>
