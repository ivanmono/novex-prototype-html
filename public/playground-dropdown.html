<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=480, initial-scale=1">
  <title>Novexx — Playground (Select Drawer)</title>
  <link rel="stylesheet" href="../styles/main.css">
<link href="css/styles.css" rel="stylesheet"></head>
<body>
<div class="device">
  <div class="page">

    <!-- Status Bar — RUNNING / READY state -->
<header class="status-bar" role="banner">

    <i class="icon icon--top-one icon--sm" aria-hidden="true"></i>
    <i class="icon icon--top-two icon--sm" aria-hidden="true"></i>
    <i class="icon icon--wifi icon--sm" aria-hidden="true"></i>

  <div class="status-bar__chip" role="status" aria-label="Machine status: Ready">
    <span class="status-bar__dot status-bar__dot--running" aria-hidden="true"></span>
    <span class="status-bar__label">Ready</span>
  </div>
</header>


    <div class="page-header">
      <div class="page-header__left">
        <a href="index.html" class="page-header__back" aria-label="Go back">
          <i class="icon icon--arrow-left icon--md icon--white" aria-hidden="true"></i>
        </a>
        <h1 class="page-header__title">Playground 2</h1>
      </div>
    </div>

    <main class="page__content page__content--inner" role="main">

      <!-- Select Drawer 1: Field Name (closed) -->
      <div class="select-drawer" data-drawer="" id="drawer-1">
        <span class="select-drawer__label" id="drawer-1-label">Field Name</span>
        <div class="select-drawer__border">
          <button class="select-drawer__trigger" aria-haspopup="listbox" aria-expanded="false" aria-labelledby="drawer-1-label" data-trigger="">
            <span class="select-drawer__trigger-text">Select Option</span>
            <i class="icon icon--carret icon--xs select-drawer__chevron" aria-hidden="true"></i>
          </button>
        </div>
      </div>

      <!-- Select Drawer 2: Operating Mode (closed) -->
      <div class="select-drawer" data-drawer="" id="drawer-2">
        <span class="select-drawer__label" id="drawer-2-label">Operating Mode</span>
        <div class="select-drawer__border">
          <button class="select-drawer__trigger" aria-haspopup="listbox" aria-expanded="false" aria-labelledby="drawer-2-label" data-trigger="">
            <span class="select-drawer__trigger-text">Select Mode</span>
            <i class="icon icon--carret icon--xs select-drawer__chevron" aria-hidden="true"></i>
          </button>
        </div>
      </div>

      <!-- Select Drawer 3: Print Profile (closed) -->
      <div class="select-drawer" data-drawer="" id="drawer-3">
        <span class="select-drawer__label" id="drawer-3-label">Print Profile</span>
        <div class="select-drawer__border">
          <button class="select-drawer__trigger" aria-haspopup="listbox" aria-expanded="false" aria-labelledby="drawer-3-label" data-trigger="">
            <span class="select-drawer__trigger-text">Select Profile</span>
            <i class="icon icon--carret icon--xs select-drawer__chevron" aria-hidden="true"></i>
          </button>
        </div>
      </div>

      <button class="btn btn--primary m--top--bs" type="button">Save</button>

    </main>

    <!-- Drawer overlay (shared) — populated by JS -->
    <div class="select-drawer__overlay" id="drawer-overlay" role="none">
      <div class="select-drawer__backdrop" data-close-drawer=""></div>
      <div class="select-drawer__panel" role="listbox" id="drawer-panel" aria-label="Select an option">
        <div class="select-drawer__handle"><div class="select-drawer__handle-bar"></div></div>
        <div class="select-drawer__options" id="drawer-options"></div>
        <div class="select-drawer__safe"></div>
      </div>
    </div>

    <!-- Bottom Nav — Inner pages (logged in, L2 Super Admin) -->
<nav class="bottom-nav--inner" aria-label="Page navigation">
  <!-- Floating level avatar — 21px above bar -->
  <div class="bottom-nav__avatar-wrap">
    <a href="login.html" class="bottom-nav__avatar bottom-nav__avatar--l2" aria-label="Logged in as Super Admin, Level 2">
      <span aria-hidden="true">L2</span>
    </a>
    <span class="bottom-nav__label">Super Admin</span>
  </div>

  <div class="bottom-nav__gradient-line" aria-hidden="true"></div>

  <div class="bottom-nav__inner-bar">
    <!-- Back -->
    <a href="javascript:history.back()" class="bottom-nav__item" aria-label="Go back">
      <i class="icon icon--back-circle icon--md icon--white" aria-hidden="true"></i>
      <span class="bottom-nav__label">Back</span>
    </a>

    <!-- Spacer (avatar placeholder) -->
    <div class="bottom-nav__spacer" aria-hidden="true"></div>

    <!-- Menu -->
    <a href="menu.html" class="bottom-nav__item" aria-label="Open menu">
      <i class="icon icon--fill-more icon--sm icon--white" aria-hidden="true"></i>
      <span class="bottom-nav__label">Menu</span>
    </a>
  </div>
</nav>


  </div>
</div>
<script src="../js/main.js"></script>
<script defer src="js/bundle.js"></script></body>
</html>
