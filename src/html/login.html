<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=480, initial-scale=1">
  <title>Novexx — Login</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<div class="device">
  <div class="page">

    <include src="partials/status-bar.html"></include>

    <!-- Page header -->
    <div class="page-header">
      <div class="page-header__left">
        <a href="index.html" class="page-header__back" aria-label="Go back">
          <i class="icon icon--arrow-left icon--md icon--white" aria-hidden="true"></i>
        </a>
        <h1 class="page-header__title">Login</h1>
      </div>
    </div>

    <!-- Login form -->
    <main class="page__content page__content--inner">
      <form action="menu.html" method="get" novalidate class="form-stack">
        <!-- Username -->
        <div class="input-field">
          <label class="input-field__label" for="username">Username</label>
          <input
            class="input"
            id="username"
            name="username"
            type="text"
            placeholder="Enter username"
            autocomplete="username"
            aria-required="true"
          >
        </div>

        <!-- Password -->
        <div class="input-field">
          <label class="input-field__label" for="password">Password</label>
          <input
            class="input"
            id="password"
            name="password"
            type="password"
            placeholder="Enter password"
            autocomplete="current-password"
            aria-required="true"
          >
        </div>

        <button type="submit" class="btn btn--primary">Login</button>
      </form>
    </main>

    <include src="partials/bottom-nav-inner--guest.html"></include>

  </div>
</div>
<script src="../js/main.js"></script>
</body>
</html>
