<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=480, initial-scale=1">
  <title>Novexx — Change Password (Numeric Keyboard)</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<div class="device">
  <div class="page">

    <include src="partials/status-bar.html"></include>

    <div class="page-header">
      <div class="page-header__left">
        <a href="manage-users-edit.html" class="page-header__back" aria-label="Back">
          <i class="icon icon--arrow-left icon--md icon--white" aria-hidden="true"></i>
        </a>
        <h1 class="page-header__title">Edit Password</h1>
      </div>
    </div>

    <main class="page__content page__content--keyboard" role="main">
      <div class="input-field">
        <label class="input-field__label" for="num-current">Current Password</label>
        <input class="input" id="num-current" type="password" value="••••••••">
      </div>
      <div class="input-field">
        <label class="input-field__label" for="num-new">New Password</label>
        <input class="input" id="num-new" type="text" placeholder="1…" aria-label="New password being typed">
      </div>
    </main>

    <!-- Numeric keyboard overlay -->
    <div class="keyboard keyboard--numeric" role="application" aria-label="Numeric keyboard">
      <div class="keyboard__row">
        <button class="keyboard__key">1</button>
        <button class="keyboard__key">2</button>
        <button class="keyboard__key">3</button>
      </div>
      <div class="keyboard__row">
        <button class="keyboard__key">4</button>
        <button class="keyboard__key">5</button>
        <button class="keyboard__key">6</button>
      </div>
      <div class="keyboard__row">
        <button class="keyboard__key">7</button>
        <button class="keyboard__key">8</button>
        <button class="keyboard__key">9</button>
      </div>
      <div class="keyboard__row">
        <button class="keyboard__key keyboard__key--action">ABC</button>
        <button class="keyboard__key">0</button>
        <button class="keyboard__key keyboard__key--action" aria-label="Delete">⌫</button>
      </div>
    </div>

    <include src="partials/bottom-nav-inner.html"></include>

  </div>
</div>
<script src="../js/main.js"></script>
</body>
</html>
