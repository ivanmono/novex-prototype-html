<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=480, initial-scale=1">
  <title>Novexx — Playground (Sliders)</title>
  <link rel="stylesheet" href="../styles/main.css">
<link href="css/styles.css" rel="stylesheet"></head>
<body>
<div class="device">
  <div class="page">

    <!-- Status Bar — RUNNING / READY state -->
<header class="status-bar" role="banner">

    <i class="icon icon--top-one icon--sm" aria-hidden="true"></i>
    <i class="icon icon--top-two icon--sm" aria-hidden="true"></i>
    <i class="icon icon--wifi icon--sm" aria-hidden="true"></i>

  <div class="status-bar__chip" role="status" aria-label="Machine status: Ready">
    <span class="status-bar__dot status-bar__dot--running" aria-hidden="true"></span>
    <span class="status-bar__label">Ready</span>
  </div>
</header>


    <div class="page-header">
      <div class="page-header__left">
        <a href="index.html" class="page-header__back" aria-label="Go back">
          <i class="icon icon--arrow-left icon--md icon--white" aria-hidden="true"></i>
        </a>
        <h1 class="page-header__title">Playground</h1>
      </div>
    </div>

    <main class="page__content page__content--inner" role="main">

      <!-- Slider 1: 0–10, value=4 (40% → mid → yellow) -->
      <div class="slider" data-slider="" data-min="0" data-max="10" data-value="4" data-step="1">
        <label class="slider__label" id="slider-1-label">Slider for parameter #1</label>
        <div class="slider__row">
          <button class="slider__btn m--top--1-neg" data-decrement="" aria-label="Decrease slider 1">
            <i class="icon icon--arrow-carret-left icon--sm" aria-hidden="true"></i>
          </button>
          <div class="slider__track-wrap">
            <div class="slider__minmax">
              <span class="slider__min">0</span>
              <span class="slider__max">10</span>
            </div>
            <div class="slider__track-container">
              <div class="slider__track-border">
                <div class="slider__track">
                  <div class="slider__fill slider__fill--mid" data-fill="" style="width:40%"></div>
                </div>
              </div>
              <div class="slider__thumb" data-thumb="" style="left:40%">
                <div class="slider__thumb-inner"></div>
              </div>
              <input type="range" class="slider__input" min="0" max="10" value="4" step="1" aria-labelledby="slider-1-label" aria-valuemin="0" aria-valuemax="10" aria-valuenow="4">
            </div>
            <div class="slider__ticks" aria-hidden="true">
              <span class="slider__tick slider__tick--major"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--major"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--major"></span>
            </div>
            <div class="slider__value-wrap" aria-hidden="true">
              <span class="slider__value" data-value="" style="left:40%">4</span>
            </div>
          </div>
          <button class="slider__btn m--top--1-neg" data-increment="" aria-label="Increase slider 1">
            <i class="icon icon--arrow-carret-right icon--sm" aria-hidden="true"></i>
          </button>
        </div>
      </div>

      <!-- Slider 2: 0–100, value=0 (0% → low → red) -->
      <div class="slider" data-slider="" data-min="0" data-max="100" data-value="0" data-step="1">
        <label class="slider__label" id="slider-2-label">Slider for parameter #2</label>
        <div class="slider__row">
          <button class="slider__btn m--top--1-neg" data-decrement="" aria-label="Decrease slider 2">
            <i class="icon icon--arrow-carret-left icon--sm" aria-hidden="true"></i>
          </button>
          <div class="slider__track-wrap">
            <div class="slider__minmax">
              <span class="slider__min">0</span>
              <span class="slider__max">100</span>
            </div>
            <div class="slider__track-container">
              <div class="slider__track-border">
                <div class="slider__track">
                  <div class="slider__fill slider__fill--low" data-fill="" style="width:0%"></div>
                </div>
              </div>
              <div class="slider__thumb" data-thumb="" style="left:0%">
                <div class="slider__thumb-inner"></div>
              </div>
              <input type="range" class="slider__input" min="0" max="100" value="0" step="1" aria-labelledby="slider-2-label" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            </div>
            <div class="slider__ticks" aria-hidden="true">
              <span class="slider__tick slider__tick--major"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--major"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--major"></span>
            </div>
            <div class="slider__value-wrap" aria-hidden="true">
              <span class="slider__value" data-value="" style="left:0%">0</span>
            </div>
          </div>
          <button class="slider__btn m--top--1-neg" data-increment="" aria-label="Increase slider 2">
            <i class="icon icon--arrow-carret-right icon--sm" aria-hidden="true"></i>
          </button>
        </div>
      </div>

      <!-- Slider 3: 0–10000, value=0 -->
      <div class="slider" data-slider="" data-min="0" data-max="10000" data-value="0" data-step="100">
        <label class="slider__label" id="slider-3-label">Slider for parameter #3</label>
        <div class="slider__row">
          <button class="slider__btn m--top--1-neg" data-decrement="" aria-label="Decrease slider 3">
            <i class="icon icon--arrow-carret-left icon--sm" aria-hidden="true"></i>
          </button>
          <div class="slider__track-wrap">
            <div class="slider__minmax">
              <span class="slider__min">0</span>
              <span class="slider__max">10000</span>
            </div>
            <div class="slider__track-container">
              <div class="slider__track-border">
                <div class="slider__track">
                  <div class="slider__fill slider__fill--low" data-fill="" style="width:0%"></div>
                </div>
              </div>
              <div class="slider__thumb" data-thumb="" style="left:0%">
                <div class="slider__thumb-inner"></div>
              </div>
              <input type="range" class="slider__input" min="0" max="10000" value="0" step="100" aria-labelledby="slider-3-label" aria-valuemin="0" aria-valuemax="10000" aria-valuenow="0">
            </div>
            <div class="slider__ticks" aria-hidden="true">
              <span class="slider__tick slider__tick--major"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--major"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--minor"></span>
              <span class="slider__tick slider__tick--major"></span>
            </div>
            <div class="slider__value-wrap" aria-hidden="true">
              <span class="slider__value" data-value="" style="left:0%">0</span>
            </div>
          </div>
          <button class="slider__btn m--top--1-neg" data-increment="" aria-label="Increase slider 3">
            <i class="icon icon--arrow-carret-right icon--sm" aria-hidden="true"></i>
          </button>
        </div>
      </div>

      <button class="btn btn--primary m--top--bs" type="button">Save</button>

    </main>

    <!-- Bottom Nav — Inner pages (logged in, L2 Super Admin) -->
<nav class="bottom-nav--inner" aria-label="Page navigation">
  <!-- Floating level avatar — 21px above bar -->
  <div class="bottom-nav__avatar-wrap">
    <a href="login.html" class="bottom-nav__avatar bottom-nav__avatar--l2" aria-label="Logged in as Super Admin, Level 2">
      <span aria-hidden="true">L2</span>
    </a>
    <span class="bottom-nav__label">Super Admin</span>
  </div>

  <div class="bottom-nav__gradient-line" aria-hidden="true"></div>

  <div class="bottom-nav__inner-bar">
    <!-- Back -->
    <a href="javascript:history.back()" class="bottom-nav__item" aria-label="Go back">
      <i class="icon icon--back-circle icon--md icon--white" aria-hidden="true"></i>
      <span class="bottom-nav__label">Back</span>
    </a>

    <!-- Spacer (avatar placeholder) -->
    <div class="bottom-nav__spacer" aria-hidden="true"></div>

    <!-- Menu -->
    <a href="menu.html" class="bottom-nav__item" aria-label="Open menu">
      <i class="icon icon--fill-more icon--sm icon--white" aria-hidden="true"></i>
      <span class="bottom-nav__label">Menu</span>
    </a>
  </div>
</nav>


  </div>
</div>
<script src="../js/main.js"></script>
<script defer src="js/bundle.js"></script></body>
</html>
