<!-- Status Bar — ERROR state -->
<header class="status-bar" role="banner">
    <i class="icon icon--top-one icon--sm" aria-hidden="true"></i>
    <i class="icon icon--top-two icon--sm" aria-hidden="true"></i>
    <i class="icon icon--wifi icon--sm" aria-hidden="true"></i>
  <div class="status-bar__chip" role="status" aria-label="Machine status: Error">
    <span class="status-bar__dot status-bar__dot--error" aria-hidden="true"></span>
    <span class="status-bar__label status-bar__label--error">Error</span>
  </div>
</header>
