<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=480, initial-scale=1">
  <title>Novexx — Manage Users</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<div class="device">
  <div class="page">

    <include src="partials/status-bar.html"></include>

    <!-- Page header with Add New button -->
    <div class="page-header">
      <div class="page-header__left">
        <a href="menu.html" class="page-header__back" aria-label="Back to menu">
          <i class="icon icon--arrow-left icon--md icon--white" aria-hidden="true"></i>
        </a>
        <h1 class="page-header__title">Manage Users</h1>
      </div>
      <button class="btn btn--primary btn--action btn--disabled" disabled aria-label="Add new user (unavailable)">
        Add New
      </button>
    </div>

    <!-- User list -->
    <main class="page__content page__content--tight" role="main">

      <div class="user-tile">
        <div class="user-tile__inner">
          <div class="user-tile__info">
            <span class="user-tile__level user-tile__level--3">Level 3</span>
            <span class="user-tile__name">Alice Müller</span>
            <span class="user-tile__role">Administrator</span>
          </div>
          <a href="manage-users-edit.html" class="user-tile__edit" aria-label="Edit Alice Müller">
            <i class="icon icon--edit icon--md icon--white" aria-hidden="true"></i>
          </a>
        </div>
      </div>

      <div class="user-tile">
        <div class="user-tile__inner">
          <div class="user-tile__info">
            <span class="user-tile__level user-tile__level--1">Level 1</span>
            <span class="user-tile__name">Bob Schmidt</span>
            <span class="user-tile__role">Operator</span>
          </div>
          <a href="manage-users-edit.html" class="user-tile__edit" aria-label="Edit Bob Schmidt">
            <i class="icon icon--edit icon--md icon--white" aria-hidden="true"></i>
          </a>
        </div>
      </div>

      <div class="user-tile">
        <div class="user-tile__inner">
          <div class="user-tile__info">
            <span class="user-tile__level user-tile__level--2">Level 2</span>
            <span class="user-tile__name">Carol Weber</span>
            <span class="user-tile__role">Supervisor</span>
          </div>
          <a href="manage-users-edit.html" class="user-tile__edit" aria-label="Edit Carol Weber">
            <i class="icon icon--edit icon--md icon--white" aria-hidden="true"></i>
          </a>
        </div>
      </div>

      <div class="user-tile">
        <div class="user-tile__inner">
          <div class="user-tile__info">
            <span class="user-tile__level user-tile__level--1">Level 1</span>
            <span class="user-tile__name">David Braun</span>
            <span class="user-tile__role">Operator</span>
          </div>
          <a href="manage-users-edit.html" class="user-tile__edit" aria-label="Edit David Braun">
            <i class="icon icon--edit icon--md icon--white" aria-hidden="true"></i>
          </a>
        </div>
      </div>

    </main>

    <include src="partials/bottom-nav-inner.html"></include>

  </div>
</div>
<script src="../js/main.js"></script>
</body>
</html>
