<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=480, initial-scale=1">
  <title>Novexx — Home</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<div class="device">
  <div class="page">

    <include src="partials/status-bar.html"></include>

    <main class="page__content page__content--home">
      <div class="page__glow" aria-hidden="true"></div>

      <img src="../assets/images/logo.svg" alt="Novexx Solutions" class="home__logo">

      <!-- Circular play button -->
      <button class="play-btn" aria-label="Machine running — click to pause">
        <div class="play-btn__ring">
          <div class="play-btn__inner">
            <i class="icon icon--pause-big icon--xl icon--white" aria-hidden="true"></i>
          </div>
        </div>
      </button>

      <!-- Machine name + status pill -->
      <div class="home__machine-info">
        <span class="t-hero">Line Name 5468</span>
        <span class="status-pill status-pill--running" role="status">RUNNING</span>
      </div>

      <!-- Quick link tiles 2×2 -->
      <div class="quick-links" role="navigation" aria-label="Quick links">
        <a href="home-error.html" class="quick-link" aria-label="Playground — Sliders">
          <div class="quick-link__inner">
            <div class="quick-link__text">
              <span class="quick-link__category">Playground</span>
              <span class="quick-link__name">Home Errors</span>
            </div>
            <i class="icon icon--arrow-right icon--sm icon--white" aria-hidden="true"></i>
          </div>
        </a>

        <a href="home-standby.html" class="quick-link" aria-label="Playground — Select Drawer">
          <div class="quick-link__inner">
            <div class="quick-link__text">
              <span class="quick-link__category">Playground</span>
              <span class="quick-link__name">Standby</span>
            </div>
            <i class="icon icon--arrow-right icon--sm icon--white" aria-hidden="true"></i>
          </div>
        </a>

        <a href="playground.html" class="quick-link" aria-label="Playground — Input Fields">
          <div class="quick-link__inner">
            <div class="quick-link__text">
              <span class="quick-link__category">Playground</span>
              <span class="quick-link__name">Sliders</span>
            </div>
            <i class="icon icon--arrow-right icon--sm icon--white" aria-hidden="true"></i>
          </div>
        </a>

        <a href="chart.html" class="quick-link" aria-label="Production — Formats/Recipes (unavailable)">
          <div class="quick-link__inner">
            <div class="quick-link__text">
              <span class="quick-link__category">Production</span>
              <span class="quick-link__name">Charts</span>
            </div>
            <i class="icon icon--arrow-right icon--sm icon--muted" aria-hidden="true"></i>
          </div> 
        </a>

        <a href="playground-date.html" class="quick-link" aria-label="Playground — Input Fields">
          <div class="quick-link__inner">
            <div class="quick-link__text">
              <span class="quick-link__category">Playground</span>
              <span class="quick-link__name">Date picker</span>
            </div>
            <i class="icon icon--arrow-right icon--sm icon--white" aria-hidden="true"></i> 
          </div>
        </a>

        <a href="playground-dropdown.html" class="quick-link" aria-label="Production — Formats/Recipes (unavailable)">
          <div class="quick-link__inner">
            <div class="quick-link__text">
              <span class="quick-link__category">Playground</span>
              <span class="quick-link__name">Dropdown</span>
            </div>
            <i class="icon icon--arrow-right icon--sm icon--muted" aria-hidden="true"></i> 
          </div>
        </a>
      </div>
    </main>

    <include src="partials/bottom-nav-home.html"></include>

  </div>
</div>
<script src="../js/main.js"></script>
</body>
</html>
