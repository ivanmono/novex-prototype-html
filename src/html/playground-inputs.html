<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=480, initial-scale=1">
  <title>Novexx — Playground (Input Fields)</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<div class="device">
  <div class="page">

    <include src="partials/status-bar.html"></include>

    <div class="page-header">
      <div class="page-header__left">
        <a href="index.html" class="page-header__back" aria-label="Go back">
          <i class="icon icon--arrow-left icon--md icon--white" aria-hidden="true"></i>
        </a>
        <h1 class="page-header__title">Playground 3</h1>
      </div>
    </div>

    <main class="page__content page__content--inner" role="main">

      <!-- Standalone numeric input with unit -->
      <div class="input-field">
        <label class="input-field__label" for="pf-speed">Print speed</label>
        <div class="input-field__border">
          <div class="input-field__row">
            <input class="input-field__control input-field__control--number" id="pf-speed" type="number" value="1.2356" aria-label="Print speed value">
            <span class="input-field__unit">pcs/h</span>
          </div>
        </div>
      </div>

      <!-- Row group — two inputs side by side -->
      <div class="input-group input-group--row">
        <div class="input-field">
          <label class="input-field__label" for="pf-start-c">Start</label>
          <div class="input-field__border">
            <div class="input-field__row">
              <input class="input-field__control input-field__control--number" id="pf-start-c" type="number" placeholder="Value">
              <span class="input-field__unit">°C</span>
            </div>
          </div>
        </div>
        <div class="input-field">
          <label class="input-field__label" for="pf-end-c">End</label>
          <div class="input-field__border">
            <div class="input-field__row">
              <input class="input-field__control input-field__control--number" id="pf-end-c" type="number" placeholder="Value">
              <span class="input-field__unit">°C</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Column group — two inputs stacked -->
      <div class="input-group input-group--column">
        <div class="input-field">
          <label class="input-field__label" for="pf-start-m">Start</label>
          <div class="input-field__border">
            <div class="input-field__row">
              <input class="input-field__control input-field__control--number" id="pf-start-m" type="number" value="12">
              <span class="input-field__unit">m</span>
            </div>
          </div>
        </div>
        <div class="input-field">
          <label class="input-field__label" for="pf-end-m">End</label>
          <div class="input-field__border">
            <div class="input-field__row">
              <input class="input-field__control input-field__control--number" id="pf-end-m" type="number" value="50">
              <span class="input-field__unit">m</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Text input (no unit) -->
      <div class="input-field">
        <label class="input-field__label" for="pf-name">Product name</label>
        <div class="input-field__border">
          <div class="input-field__row">
            <input class="input-field__control input-field__control--text" id="pf-name" type="text" placeholder="Enter product name">
          </div>
        </div>
      </div>

      <button class="btn btn--primary m--top--bs" type="button">Save</button>

    </main>

    <include src="partials/bottom-nav-inner.html"></include>

  </div>
</div>
<script src="../js/main.js"></script>
</body>
</html>
