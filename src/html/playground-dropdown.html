<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=480, initial-scale=1">
  <title>Novexx — Playground (Select Drawer)</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<div class="device">
  <div class="page">

    <include src="partials/status-bar.html"></include>

    <div class="page-header">
      <div class="page-header__left">
        <a href="index.html" class="page-header__back" aria-label="Go back">
          <i class="icon icon--arrow-left icon--md icon--white" aria-hidden="true"></i>
        </a>
        <h1 class="page-header__title">Playground 2</h1>
      </div>
    </div>

    <main class="page__content page__content--inner" role="main">

      <!-- Select Drawer 1: Field Name (closed) -->
      <div class="select-drawer" data-drawer id="drawer-1">
        <span class="select-drawer__label" id="drawer-1-label">Field Name</span>
        <div class="select-drawer__border">
          <button class="select-drawer__trigger"
                  aria-haspopup="listbox"
                  aria-expanded="false"
                  aria-labelledby="drawer-1-label"
                  data-trigger>
            <span class="select-drawer__trigger-text">Select Option</span>
            <i class="icon icon--carret icon--xs select-drawer__chevron" aria-hidden="true"></i>
          </button>
        </div>
      </div>

      <!-- Select Drawer 2: Operating Mode (closed) -->
      <div class="select-drawer" data-drawer id="drawer-2">
        <span class="select-drawer__label" id="drawer-2-label">Operating Mode</span>
        <div class="select-drawer__border">
          <button class="select-drawer__trigger"
                  aria-haspopup="listbox"
                  aria-expanded="false"
                  aria-labelledby="drawer-2-label"
                  data-trigger>
            <span class="select-drawer__trigger-text">Select Mode</span>
            <i class="icon icon--carret icon--xs select-drawer__chevron" aria-hidden="true"></i>
          </button>
        </div>
      </div>

      <!-- Select Drawer 3: Print Profile (closed) -->
      <div class="select-drawer" data-drawer id="drawer-3">
        <span class="select-drawer__label" id="drawer-3-label">Print Profile</span>
        <div class="select-drawer__border">
          <button class="select-drawer__trigger"
                  aria-haspopup="listbox"
                  aria-expanded="false"
                  aria-labelledby="drawer-3-label"
                  data-trigger>
            <span class="select-drawer__trigger-text">Select Profile</span>
            <i class="icon icon--carret icon--xs select-drawer__chevron" aria-hidden="true"></i>
          </button>
        </div>
      </div>

      <button class="btn btn--primary m--top--bs" type="button">Save</button>

    </main>

    <!-- Drawer overlay (shared) — populated by JS -->
    <div class="select-drawer__overlay" id="drawer-overlay" role="none">
      <div class="select-drawer__backdrop" data-close-drawer></div>
      <div class="select-drawer__panel" role="listbox" id="drawer-panel" aria-label="Select an option">
        <div class="select-drawer__handle"><div class="select-drawer__handle-bar"></div></div>
        <div class="select-drawer__options" id="drawer-options"></div>
        <div class="select-drawer__safe"></div>
      </div>
    </div>

    <include src="partials/bottom-nav-inner.html"></include>

  </div>
</div>
<script src="../js/main.js"></script>
</body>
</html>
